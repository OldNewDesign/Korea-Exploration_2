s just beginning, making this a timely food destination to visit.", "location": "\ub124\ubaa8\ub124, \uc131\ub3d9\uad6c \uc0c1\uc6d02\uae38 6, Seongsu, Seoul", "url": "https://www.instagram.com/p/DZHgsTWGlNt/?img_index=7"}, {"lat": 37.5666791, "lng": 126.9782914, "creator": "lifewithkatielk", "topic": "Places to Eat", "platform": "Instagram", "cls": "ig", "summary": "A hidden juk (Korean rice porridge) breakfast is served each morning at Hansik Wangbijib in Myeongdong, a restaurant better known for BBQ, offering generous banchan, no queues, and a spacious setting ideal for families. The creator recommends it as a superior alternative to more well-known juk spots in the area.", "location": "Hansik Wangbijib \ud55c\uc2dd\uc655\ube44\uc9d1, Myeongdong, Seoul, South Korea", "url": "https://www.instagram.com/reel/DZIF_ZWt0bf/"}, {"lat": 37.5666791, "lng": 126.9782914, "creator": "teureissi", "topic": "Places to Eat", "platform": "Instagram", "cls": "ig", "summary": "A restaurant in Seoul serving oriental medicine dakgalbi and handmade kalguksu noodles, reportedly popular with Korean celebrities, also offers complimentary slushed iced coffee. The creator recommends it as a hidden local gem worth visiting in Seoul.", "location": "Seoul, South Korea", "url": "https://www.instagram.com/reel/DXtyngdj2f3/"}, {"lat": 37.5666791, "lng": 126.9782914, "creator": "s.yellowvibes", "topic": "Places to Eat", "platform": "Instagram", "cls": "ig", "summary": "A detailed review of Nurungji Tongdak (Scorched Rice Chicken) at a restaurant in Wangsimni, Seoul, featuring oak wood-roasted chicken stuffed with glutinous rice pressed onto a hot stone plate. The reviewer highlights the exceptional crispy scorched rice as the standout element alongside various side dishes.", "location": "WSL_TD restaurant, Wangsimni, Seoul, South Korea", "url": "https://www.instagram.com/p/DY1tGXiE2Zp/?img_index=5"}, {"lat": 36.638392, "lng": 127.6961188, "creator": "korea.in.motion", "topic": "Shopping & Markets", "platform": "Instagram", "cls": "ig", "summary": "A video showcasing a toy and stationery shop or experience in South Korea that evokes nostalgic childhood memories. The reel highlights playful, retro-themed items with a dreamlike atmosphere.", "location": "South Korea", "url": "https://www.instagram.com/reel/DZHNJ8oBUuO/"}, {"lat": 37.5442441, "lng": 127.0634367, "creator": "seoulhotple", "topic": "Shopping & Markets", "platform": "Instagram", "cls": "ig", "summary": "A 29CM x LOFT collaboration pop-up store is opening in Seongsu-dong, Seoul from September 2\u20136, featuring popular Japanese lifestyle and stationery products that are difficult to find in Korea. The event is held at the 29CM store on Yeonmujang-gil.", "location": "29CM, Yeonmujang-gil, Seongsu-dong, Seoul", "url": "https://www.instagram.com/p/DZJ6PHdjJ3-/?img_index=2"}, {"lat": 37.2884675, "lng": 127.0535231, "creator": "beautydaykorea", "topic": "Shopping & Markets", "platform": "Instagram", "cls": "ig", "summary": "Hyundai Premium Outlet Kimpo Branch is an open-air premium shopping destination 10\u201315 minutes from Gimpo Airport, featuring 100+ fashion, sports, and lifestyle brands with real outlet pricing, plus caf\u00e9s and restaurants. It's ideal for travelers with a half-day layover or those seeking a quick shopping escape from central Seoul.", "location": "Hyundai Premium Outlet Kimpo Branch, 38 Gimpo-daero 1525beon-gil, Gimpo-si, Gyeonggi-do, South Korea", "url": "https://www.instagram.com/reel/DXmBaktDg6V/"}];var COLORS = {"ig": "#c8472f", "tt": "#1f8f8a", "yt": "#cf2e2e", "fb": "#2f5fa8", "xx": "#1c1c1c", "rd": "#cf5a2e", "other": "#3f6b5c"};

function gmap(loc){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(loc);}

}
function legendHTML(used){
  var h=''; Object.keys(used).forEach(function(p){

  }); return h;
}
var map = L.map('map');L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19, attribution:'&copy; OpenStreetMap contributors'}).addTo(map);if(!DATA.length){document.body.insertAdjacentHTML('beforeend','<div class=\"empty\">No mapped locations yet.</div>');map.setView([20,0],2);} else {var markers=[], used={};DATA.forEach(function(d){var color = COLORS[d.cls] || COLORS.other; used[d.platform]=color;var m = L.circleMarker([d.lat,d.lng],{radius:8,weight:2,color:'#fff',fillColor:color,fillOpacity:.95});m.bindPopup(popup(d),{maxWidth:280}); m.addTo(map); markers.push(m);});map.fitBounds(L.featureGroup(markers).getBounds().pad(0.15));setTimeout(function(){map.invalidateSize();},250);window.addEventListener('resize',function(){map.invalidateSize();});var legend = L.control({position:'bottomright'});legend.onAdd = function(){ var div=L.DomUtil.create('div','legend'); div.innerHTML=legendHTML(used); return div; };legend.addTo(map);}</script></body></html>
